<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CineSearch - Search TV shows and movies using TVMaze. Discover ratings, images, and details instantly.">
  <title>CineSearch — Discover Shows & Movies</title>
  
  <!-- Dış Kaynaklar -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Kendi CSS Dosyamız -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-custom">
  <div class="container">
    <span class="navbar-brand-text">Cine Search</span>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="container">
    <h1>Discover <span class="gradient">Amazing Shows</span></h1>
    <p>Search thousands of TV shows and movies instantly — powered by TVMaze.</p>
    <div class="search-wrap">
      <input type="text" id="searchInput" class="form-control" placeholder="Search for a show…" autocomplete="off">
      <button class="btn btn-search" id="searchBtn">Search</button>
    </div>
  </div>
</section>

<!-- Results -->
<section class="results-section">
  <div class="container">
    <div id="statusArea"></div>
    <div class="row g-4" id="resultsGrid"></div>
  </div>
</section>

<!-- Footer -->
<footer class="footer-custom">
  Powered by <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">TMDB API</a> &bull; CineSearch &copy; 2026
</footer>

<!-- Dış Script Kaynakları -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Kendi JavaScript Dosyamız -->
<script src="script.js"></script>
</body>
</html>
